<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spanish App</title>
    <script>
      // GitHub Pages SPA fallback: rewrite the 404 URL into a query the app
      // can read, then redirect to the app root so the React router can
      // resolve the original path.
      (function () {
        var segmentCount = 1; // repo segment: /Spanish-app/
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
